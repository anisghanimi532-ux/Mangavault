<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MangaVault</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #07090f;
  --surface: #0d1117;
  --surface2: #161b27;
  --border: rgba(255,255,255,0.07);
  --accent: #e63946;
  --accent2: #4cc9f0;
  --gold: #ffd166;
  --purple: #7b2fff;
  --text: #e8eaf0;
  --text2: #6b7a99;
  --green: #a8e063;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Kufi Arabic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* === AUTH === */
#auth-screen {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 30% 40%, rgba(123,47,255,0.12) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 60%, rgba(230,57,70,0.08) 0%, transparent 60%),
              var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; z-index: 1000;
}

.auth-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 64px; letter-spacing: 6px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.auth-tagline { color: var(--text2); font-size: 13px; letter-spacing: 2px; margin-bottom: 40px; }

.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px 36px;
  width: 360px;
  box-shadow: 0 50px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
}

.auth-toggle {
  display: flex; gap: 4px;
  background: var(--bg); border-radius: 12px; padding: 4px;
  margin-bottom: 32px;
}
.atab {
  flex: 1; padding: 10px; border: none; border-radius: 9px;
  background: transparent; color: var(--text2);
  font-family: 'Noto Kufi Arabic', sans-serif; font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.atab.on { background: var(--accent); color: #fff; font-weight: 700; }

.afield { margin-bottom: 18px; }
.afield label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 7px; letter-spacing: 0.5px; }
.afield input {
  width: 100%; background: var(--bg);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 13px 16px; color: var(--text);
  font-family: 'Noto Kufi Arabic', sans-serif; font-size: 14px;
  outline: none; transition: border-color 0.2s; direction: rtl;
}
.afield input:focus { border-color: var(--accent); }

.abtn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  border: none; border-radius: 12px; color: #fff;
  font-family: 'Noto Kufi Arabic', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: all 0.2s; margin-top: 4px;
  box-shadow: 0 8px 24px rgba(230,57,70,0.3);
}
.abtn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(230,57,70,0.4); }
.aerr { color: var(--accent); font-size: 12px; text-align: center; margin-top: 12px; min-height: 16px; }

/* === APP === */
#app { display: none; }

/* NAV */
nav {
  position: sticky; top: 0; z-index: 200;
  height: 60px; padding: 0 28px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(7,9,15,0.9); backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}
.nlogo {
  font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 4px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.nlinks { display: flex; gap: 2px; }
.nbtn {
  padding: 7px 14px; border: none; border-radius: 8px;
  background: transparent; color: var(--text2);
  font-family: 'Noto Kufi Arabic', sans-serif; font-size: 13px;
  cursor: pointer; transition: all 0.18s;
}
.nbtn:hover { background: var(--surface2); color: var(--text); }
.nbtn.on { color: var(--accent); background: rgba(230,57,70,0.1); }

.nright { display: flex; align-items: center; gap: 10px; }
.navatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
}
.nlogout {
  padding: 6px 13px; border: 1px solid var(--border); border-radius: 8px;
  background: transparent; color: var(--text2);
  font-family: 'Noto Kufi Arabic', sans-serif; font-size: 12px; cursor: pointer;
  transition: all 0.2s;
}
.nlogout:hover { border-color: var(--accent); color: var(--accent); }

/* PAGES */
.page { display: none; max-width: 1280px; margin: 0 auto; padding: 36px 24px; }
.page.on { display: block; }

/* SEARCH PAGE */
.search-hero {
  text-align: center; padding: 48px 0 40px;
}
.search-hero h1 {
  font-family: 'Bebas Neue', sans-serif; font-size: 56px;
  letter-spacing: 3px; line-height: 1; margin-bottom: 8px;
}
.search-hero h1 span { color: var(--accent); }
.search-hero p { color: var(--text2); font-size: 14px; margin-bottom: 32px; }

.search-wrap {
  max-width: 600px; margin: 0 auto;
  display: flex; gap: 10px;
}
.search-wrap input {
  flex: 1; background: var(--surface);
  border: 1px solid var(--border); border-radius: 14px;
  padding: 15px 20px; color: var(--text);
  font-family: 'Noto Kufi Arabic', sans-serif; font-size: 15px;
  outline: none; direction: rtl; transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap button {
  padding: 15px 24px;
  background: var(--accent); border: none; border-radius: 14px;
  color: #fff; font-family: 'Noto Kufi Arabic', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
}
.search-wrap button:hover { background: #c1121f; transform: scale(1.02); }

/* GENRE PILLS */
.genre-row {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; margin: 24px 0 36px;
}
.genre-pill {
  padding: 7px 16px; border-radius: 100px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text2); font-size: 12px; cursor: pointer;
  transition: all 0.18s;
}
.genre-pill:hover { border-color: var(--accent); color: var(--accent); }

/* RESULTS */
.results-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.results-title { font-size: 14px; color: var(--text2); }
.results-title span { color: var(--text); font-weight: 700; }

/* GRID */
.manga-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px;
}

.mcard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
  cursor: pointer; transition: all 0.22s;
  position: relative; animation: fadeUp 0.3s ease both;
}
.mcard:hover { transform: translateY(-6px); box-shadow: 0 24px 48px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.15); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.mcard img {
  width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block;
  background: var(--surface2);
}

.mcard-fav {
  position: absolute; top: 8px; left: 8px;
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(7,9,15,0.75); backdrop-filter: blur(6px);
  border: none; color: var(--text2); font-size: 15px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; z-index: 2;
}
.mcard-fav.on { color: #ff6b6b; }
.mcard-fav:hover { background: rgba(7,9,15,0.95); transform: scale(1.1); }

.score-badge {
  position: absolute; top: 8px; right: 8px;
  background: rgba(7,9,15,0.85); backdrop-filter: blur(6px);
  border-radius: 8px; padding: 3px 8px;
  font-size: 11px; font-weight: 700; color: var(--gold);
  display: flex; align-items: center; gap: 3px;
}

.mcard-body { padding: 12px; }
.mcard-title {
  font-size: 13px; font-weight: 600; margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.mcard-meta { font-size: 11px; color: var(--text2); display: flex; gap: 8px; flex-wrap: wrap; }
.mcard-meta span { display: flex; align-items: center; gap: 3px; }

.add-btn {
  width: 100%; margin-top: 10px; padding: 8px;
  background: rgba(230,57,70,0.12); border: 1px solid rgba(230,57,70,0.25);
  border-radius: 8px; color: var(--accent);
  font-family: 'Noto Kufi Arabic', sans-serif; font-size: 12px;
  cursor: pointer; transition: all 0.2s; font-weight: 600;
}
.add-btn:hover { background: rgba(230,57,70,0.2); }
.add-btn.added { background: rgba(168,224,99,0.1); border-color: rgba(168,224,99,0.3); color: var(--green); }

/* MY LIST PAGE */
.stats-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
  margin-bottom: 32px;
}
.stat {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 22px 18px; text-align: center;
}
.stat-n {
  font-family: 'Bebas Neue', sans-serif; font-size: 44px; line-height: 1;
  margin-bottom: 4px;
}
.stat-l { font-size: 12px; color: var(--text2); }

.status-tabs {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
}
.stab {
  padding: 8px 18px; border-radius: 100px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text2); font-size: 13px; cursor: pointer;
  transition: all 0.18s; font-family: 'Noto Kufi Arabic', sans-serif;
}
.stab:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
.stab.on { background: var(--accent); border-color: var(--accent); color: #fff; }

/* LIST ITEMS */
.list-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 16px;
  padding: 14px 18px; transition: all 0.2s; position: relative;
  animation: fadeUp 0.3s ease both;
}
.list-item:hover { border-color: rgba(255,255,255,0.14); transform: translateX(-3px); }

.li-cover {
  width: 52px; height: 70px; border-radius: 8px;
  object-fit: cover; background: var(--surface2); flex-shrink: 0;
}
.li-info { flex: 1; min-width: 0; }
.li-title { font-size: 14px; font-weight: 700; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-meta { font-size: 12px; color: var(--text2); display: flex; gap: 12px; flex-wrap: wrap; }

.li-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.status-sel {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 10px; color: var(--text);
  font-family: 'Noto Kufi Arabic', sans-serif; font-size: 12px;
  outline: none; cursor: pointer; direction: rtl;
}

.chapter-input {
  width: 64px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 10px; color: var(--text);
  font-family: 'Noto Kufi Arabic', sans-serif; font-size: 12px;
  outline: none; text-align: center;
}

.del-btn {
  width: 30px; height: 30px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text2); cursor: pointer; font-size: 14px;
  transition: all 0.2s; display: flex; align-items: center; justify-content: center;
}
.del-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(230,57,70,0.1); }

.sbadge {
  padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700;
}
.s-reading { background: rgba(76,201,240,0.12); color: var(--accent2); }
.s-completed { background: rgba(168,224,99,0.12); color: var(--green); }
.s-plan { background: rgba(255,209,102,0.12); color: var(--gold); }
.s-dropped { background: rgba(230,57,70,0.12); color: var(--accent); }

/* FAVORITES */
/* (reuses manga-grid + mcard) */

/* DETAIL MODAL */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  backdrop-filter: blur(8px); z-index: 800;
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.modal-bg.open { display: flex; }

.modal-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 24px; width: 100%; max-width: 640px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 60px 120px rgba(0,0,0,0.7);
  animation: fadeUp 0.25s ease;
}

.modal-header {
  display: flex; gap: 20px; padding: 28px 28px 20px;
  border-bottom: 1px solid var(--border);
}
.modal-cover {
  width: 100px; height: 140px; border-radius: 12px;
  object-fit: cover; background: var(--surface2); flex-shrink: 0;
}
.modal-meta { flex: 1; }
.modal-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
.modal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.tag {
  padding: 4px 10px; border-radius: 6px;
  background: var(--surface2); font-size: 11px; color: var(--text2);
}
.modal-stats { display: flex; gap: 16px; font-size: 13px; color: var(--text2); }
.modal-stats span { display: flex; align-items: center; gap: 4px; }

.modal-body { padding: 20px 28px 28px; }
.modal-desc { font-size: 13px; color: var(--text2); line-height: 1.8; margin-bottom: 24px; }

.modal-add-section h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
.modal-add-row { display: flex; gap: 10px; flex-wrap: wrap; }

.mselect {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 14px; color: var(--text);
  font-family: 'Noto Kufi Arabic', sans-serif; font-size: 13px;
  outline: none; direction: rtl; min-width: 140px;
}
.mselect:focus { border-color: var(--accent); }

.modal-add-btn {
  padding: 11px 20px; background: var(--accent); border: none;
  border-radius: 10px; color: #fff;
  font-family: 'Noto Kufi Arabic', sans-serif; font-size: 13px;
  font-weight: 700; cursor: pointer; transition: all 0.2s;
}
.modal-add-btn:hover { background: #c1121f; }
.modal-add-btn.added { background: var(--green); color: #000; }

.modal-close {
  position: absolute; top: 14px; left: 14px;
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text2); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.modal-close:hover { border-color: var(--accent); color: var(--accent); }

/* LOADING */
.loader {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 80px; gap: 16px; color: var(--text2);
}
.spinner {
  width: 40px; height: 40px; border-radius: 50%;
  border: 3px solid var(--surface2); border-top-color: var(--accent);
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* EMPTY */
.empty {
  text-align: center; padding: 80px 20px; color: var(--text2);
}
.empty-icon { font-size: 56px; margin-bottom: 16px; }
.empty-t { font-size: 16px; color: var(--text); margin-bottom: 6px; }
.empty-s { font-size: 13px; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

@media (max-width: 600px) {
  .stats-grid { grid-template-columns: repeat(2,1fr); }
  .modal-header { flex-direction: column; }
  .nlinks .nbtn span { display: none; }
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">MangaVault</div>
  <div class="auth-tagline">مكتبتك المانغا الشخصية • بيانات حقيقية من MyAnimeList</div>
  <div class="auth-card">
    <div class="auth-toggle">
      <button class="atab on" onclick="authTab('login',this)">تسجيل الدخول</button>
      <button class="atab" onclick="authTab('register',this)">حساب جديد</button>
    </div>
    <div id="f-login">
      <div class="afield"><label>اسم المستخدم</label><input id="l-u" type="text" placeholder="اسم المستخدم"/></div>
      <div class="afield"><label>كلمة المرور</label><input id="l-p" type="password" placeholder="••••••"/></div>
      <button class="abtn" onclick="doLogin()">دخول 🎌</button>
    </div>
    <div id="f-register" style="display:none">
      <div class="afield"><label>اسم المستخدم</label><input id="r-u" type="text" placeholder="اختر اسماً مميزاً"/></div>
      <div class="afield"><label>كلمة المرور</label><input id="r-p" type="password" placeholder="6 أحرف على الأقل"/></div>
      <button class="abtn" onclick="doRegister()">إنشاء الحساب ✨</button>
    </div>
    <div class="aerr" id="aerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav>
    <div class="nlogo">MangaVault</div>
    <div class="nlinks">
      <button class="nbtn on" onclick="goPage('search',this)">🔍 <span>اكتشف</span></button>
      <button class="nbtn" onclick="goPage('mylist',this)">📋 <span>قائمتي</span></button>
      <button class="nbtn" onclick="goPage('favs',this)">❤️ <span>مفضلة</span></button>
    </div>
    <div class="nright">
      <div class="navatar" id="navatar">A</div>
      <button class="nlogout" onclick="doLogout()">خروج</button>
    </div>
  </nav>

  <!-- SEARCH PAGE -->
  <div class="page on" id="page-search">
    <div class="search-hero">
      <h1>اكتشف <span>مانغاك</span></h1>
      <p>بيانات حقيقية من MyAnimeList — ابحث وأضف لمكتبتك</p>
      <div class="search-wrap">
        <input id="q" type="text" placeholder="ابحث عن مانغا... مثلاً: Naruto, Berserk" onkeydown="if(event.key==='Enter')doSearch()"/>
        <button onclick="doSearch()">بحث</button>
      </div>
    </div>
    <div class="genre-row" id="genre-row"></div>
    <div id="search-results"></div>
  </div>

  <!-- MY LIST PAGE -->
  <div class="page" id="page-mylist">
    <div style="margin-bottom:28px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:2px;margin-bottom:4px">قائمة <span style="color:var(--accent)">القراءة</span></div>
      <div style="color:var(--text2);font-size:13px">تتبع تقدمك وسجّل فصولك</div>
    </div>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="status-tabs">
      <button class="stab on" onclick="setStatusFilter('all',this)">📚 الكل</button>
      <button class="stab" onclick="setStatusFilter('reading',this)">📖 أقرأ الآن</button>
      <button class="stab" onclick="setStatusFilter('completed',this)">✅ أنهيتها</button>
      <button class="stab" onclick="setStatusFilter('plan',this)">🕐 سأقرأها</button>
      <button class="stab" onclick="setStatusFilter('dropped',this)">❌ توقفت</button>
    </div>
    <div id="mylist-items"></div>
  </div>

  <!-- FAVORITES PAGE -->
  <div class="page" id="page-favs">
    <div style="margin-bottom:28px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:2px;margin-bottom:4px">❤️ <span style="color:var(--accent)">المفضلة</span></div>
      <div style="color:var(--text2);font-size:13px">مانغاتك المفضلة في مكان واحد</div>
    </div>
    <div class="manga-grid" id="favs-grid"></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal-box" style="position:relative">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-header" id="modal-header"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ======== DATA ========
let DB = JSON.parse(localStorage.getItem('mv2_db') || '{}');
let CU = localStorage.getItem('mv2_cu') || null;
let statusFilter = 'all';
let currentManga = null;

const GENRES = ['أكشن','مغامرة','كوميديا','دراما','فانتازيا','رعب','رومانسية','خيال علمي','رياضة','خارق للطبيعة'];
const GENRE_EN = ['Action','Adventure','Comedy','Drama','Fantasy','Horror','Romance','Sci-Fi','Sports','Supernatural'];

function ud() { // get user data
  if (!CU || !DB[CU]) return { list: [], favs: [] };
  return DB[CU];
}
function save() { localStorage.setItem('mv2
