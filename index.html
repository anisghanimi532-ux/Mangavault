<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MangaVault</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#07090f;
  --surface:#0d1117;
  --surface2:#161b27;
  --border:rgba(255,255,255,0.08);
  --accent:#e63946;
  --text:#fff;
  --text2:#94a3b8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Noto Kufi Arabic',sans-serif;
  background:var(--bg);
  color:var(--text);
}

#auth-screen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#07090f;
}

.auth-card{
  width:350px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:30px;
}

.auth-card h1{
  text-align:center;
  margin-bottom:25px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:none;
  border-radius:10px;
  background:var(--surface2);
  color:white;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

#aerr{
  color:#ff6b6b;
  margin-top:10px;
  text-align:center;
}

#app{
  display:none;
}

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}

.logo{
  font-size:24px;
  font-weight:700;
}

.search-wrap{
  max-width:700px;
  margin:40px auto;
  display:flex;
  gap:10px;
  padding:0 20px;
}

.search-wrap input{
  margin:0;
}

.search-wrap button{
  width:120px;
}

.manga-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:var(--surface);
  border-radius:16px;
  overflow:hidden;
  border:1px solid var(--border);
}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.card-body{
  padding:12px;
}

.card-title{
  font-size:14px;
  margin-bottom:8px;
}

.card-score{
  color:#ffd166;
  font-size:13px;
}

.loader{
  text-align:center;
  padding:40px;
}

</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <h1>MangaVault</h1>

    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">

    <button onclick="login()">دخول</button>

    <div id="aerr"></div>
  </div>
</div>

<div id="app">

  <nav>
    <div class="logo">MangaVault</div>
    <button onclick="logout()" style="width:auto;padding:10px 16px">خروج</button>
  </nav>

  <div class="search-wrap">
    <input type="text" id="q" placeholder="ابحث عن مانغا...">
    <button onclick="doSearch()">بحث</button>
  </div>

  <div class="manga-grid" id="results"></div>

</div>

<script>

// =========================
// DATABASE
// =========================

let DB = JSON.parse(localStorage.getItem('mv_users') || '{}');
let CURRENT = localStorage.getItem('mv_current') || null;


// =========================
// GENRES FIXED
// =========================

const GENRES = [
  'أكشن',
  'مغامرة',
  'كوميديا',
  'دراما',
  'فانتازيا',
  'رعب',
  'رومانسية',
  'خيال علمي',
  'رياضة',
  'خارق للطبيعة'
];

const GENRE_EN = [
  'Action',
  'Adventure',
  'Comedy',
  'Drama',
  'Fantasy',
  'Horror',
  'Romance',
  'Sci-Fi',
  'Sports',
  'Supernatural'
];


// =========================
// AUTO LOGIN
// =========================

if(CURRENT && DB[CURRENT]){
  openApp();
}


// =========================
// LOGIN
// =========================

function login(){

  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();

  const err = document.getElementById('aerr');

  if(!u || !p){
    err.innerText = 'املأ جميع الحقول';
    return;
  }

  if(!DB[u]){
    DB[u] = {
      password:p,
      list:[]
    };

    localStorage.setItem('mv_users', JSON.stringify(DB));
  }

  if(DB[u].password !== p){
    err.innerText = 'كلمة المرور خاطئة';
    return;
  }

  CURRENT = u;

  localStorage.setItem('mv_current', CURRENT);

  openApp();
}


// =========================
// OPEN APP
// =========================

function openApp(){

  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

}


// =========================
// LOGOUT
// =========================

function logout(){

  localStorage.removeItem('mv_current');

  location.reload();
}


// =========================
// SEARCH
// =========================

async function doSearch(){

  const q = document.getElementById('q').value.trim();

  if(!q) return;

  const results = document.getElementById('results');

  results.innerHTML = `
    <div class="loader">
      جاري البحث...
    </div>
  `;

  try{

    // JIKAN API
    // يعمل على GitHub Pages بدون مشاكل CORS

    const res = await fetch(
      `https://api.jikan.moe/v4/manga?q=${encodeURIComponent(q)}&limit=20`
    );

    const data = await res.json();

    renderResults(data.data || []);

  }
  catch(err){

    console.error(err);

    results.innerHTML = `
      <div class="loader">
        حدث خطأ أثناء الاتصال
      </div>
    `;
  }
}


// =========================
// RENDER
// =========================

function renderResults(items){

  const results = document.getElementById('results');

  if(!items.length){

    results.innerHTML = `
      <div class="loader">
        لا توجد نتائج
      </div>
    `;

    return;
  }

  results.innerHTML = items.map(m => `

    <div class="card">

      <img src="${m.images.jpg.image_url}" alt="${m.title}">

      <div class="card-body">

        <div class="card-title">${m.title}</div>

        <div class="card-score">⭐ ${m.score || 'N/A'}</div>

      </div>

    </div>

  `).join('');
}

</script>
</body>
</html>
