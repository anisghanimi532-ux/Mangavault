<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MangaVault</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#07090f;--s:#0d1117;--s2:#161b27;--br:rgba(255,255,255,0.07);--red:#e63946;--blue:#4cc9f0;--gold:#ffd166;--pur:#7b2fff;--tx:#e8eaf0;--tx2:#6b7a99;--gr:#a8e063}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Kufi Arabic',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}

/* AUTH */
#auth{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(123,47,255,.12) 0%,transparent 60%),radial-gradient(ellipse at 70% 60%,rgba(230,57,70,.08) 0%,transparent 60%),var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:1000}
.alogo{font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:6px;background:linear-gradient(135deg,var(--red),var(--pur));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.asub{color:var(--tx2);font-size:13px;letter-spacing:2px;margin-bottom:40px}
.acard{background:var(--s);border:1px solid var(--br);border-radius:24px;padding:40px 36px;width:340px;max-width:90vw;box-shadow:0 50px 100px rgba(0,0,0,.6)}
.atabs{display:flex;gap:4px;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:32px}
.atab{flex:1;padding:12px;border:none;border-radius:9px;background:transparent;color:var(--tx2);font-family:'Noto Kufi Arabic',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.atab.on{background:var(--red);color:#fff;font-weight:700}
.af{margin-bottom:18px}
.af label{display:block;font-size:11px;color:var(--tx2);margin-bottom:7px}
.af input{width:100%;background:var(--bg);border:1px solid var(--br);border-radius:12px;padding:14px 16px;color:var(--tx);font-family:'Noto Kufi Arabic',sans-serif;font-size:14px;outline:none;transition:border-color .2s;direction:rtl}
.af input:focus{border-color:var(--red)}
.abtn{width:100%;padding:15px;background:linear-gradient(135deg,var(--red),var(--pur));border:none;border-radius:12px;color:#fff;font-family:'Noto Kufi Arabic',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;box-shadow:0 8px 24px rgba(230,57,70,.3);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.abtn:active{opacity:.8;transform:scale(.98)}
.aerr{color:var(--red);font-size:12px;text-align:center;margin-top:12px;min-height:16px}

/* APP */
#app{display:none}
nav{position:sticky;top:0;z-index:200;height:60px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(7,9,15,.95);backdrop-filter:blur(24px);border-bottom:1px solid var(--br)}
.nlogo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;background:linear-gradient(135deg,var(--red),var(--pur));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nlinks{display:flex;gap:2px}
.nbtn{padding:7px 12px;border:none;border-radius:8px;background:transparent;color:var(--tx2);font-family:'Noto Kufi Arabic',sans-serif;font-size:12px;cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.nbtn:active,.nbtn.on{background:rgba(230,57,70,.1);color:var(--red)}
.nright{display:flex;align-items:center;gap:8px}
.nav-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--pur));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.nout{padding:6px 12px;border:1px solid var(--br);border-radius:8px;background:transparent;color:var(--tx2);font-family:'Noto Kufi Arabic',sans-serif;font-size:11px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.nout:active{border-color:var(--red);color:var(--red)}

.page{display:none;max-width:1200px;margin:0 auto;padding:28px 16px}
.page.on{display:block}

/* SEARCH */
.hero{text-align:center;padding:40px 0 32px}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:3px;line-height:1;margin-bottom:8px}
.hero h1 span{color:var(--red)}
.hero p{color:var(--tx2);font-size:13px;margin-bottom:28px}
.sbox{max-width:560px;margin:0 auto;display:flex;gap:10px}
.sbox input{flex:1;background:var(--s);border:1px solid var(--br);border-radius:14px;padding:14px 18px;color:var(--tx);font-family:'Noto Kufi Arabic',sans-serif;font-size:14px;outline:none;direction:rtl;transition:border-color .2s}
.sbox input:focus{border-color:var(--red)}
.sbox button{padding:14px 20px;background:var(--red);border:none;border-radius:14px;color:#fff;font-family:'Noto Kufi Arabic',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.sbox button:active{opacity:.8}
.gpills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:20px 0 32px}
.gpill{padding:7px 14px;border-radius:100px;border:1px solid var(--br);background:var(--s);color:var(--tx2);font-size:12px;cursor:pointer;transition:all .18s;font-family:'Noto Kufi Arabic',sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.gpill:active{border-color:var(--red);color:var(--red)}

/* GRID */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
.mcard{background:var(--s);border:1px solid var(--br);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;animation:fu .3s ease both;-webkit-tap-highlight-color:transparent}
.mcard:active{transform:scale(.97)}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.mcard img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--s2)}
.score-b{position:absolute;top:8px;right:8px;background:rgba(7,9,15,.85);backdrop-filter:blur(6px);border-radius:8px;padding:3px 8px;font-size:11px;font-weight:700;color:var(--gold)}
.fav-b{position:absolute;top:8px;left:8px;width:30px;height:30px;border-radius:50%;background:rgba(7,9,15,.75);border:none;color:var(--tx2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.fav-b.on{color:#ff6b6b}
.mcard-b{padding:10px}
.mcard-t{font-size:13px;font-weight:600;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mcard-m{font-size:11px;color:var(--tx2)}
.add-b{width:100%;margin-top:8px;padding:8px;background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.25);border-radius:8px;color:var(--red);font-family:'Noto Kufi Arabic',sans-serif;font-size:12px;cursor:pointer;font-weight:600;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.add-b.added{background:rgba(168,224,99,.1);border-color:rgba(168,224,99,.3);color:var(--gr)}
.add-b:active{opacity:.7}

/* MYLIST */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.scard{background:var(--s);border:1px solid var(--br);border-radius:14px;padding:18px;text-align:center}
.snum{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;margin-bottom:4px}
.slbl{font-size:12px;color:var(--tx2)}
.stabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.stab{padding:8px 16px;border-radius:100px;border:1px solid var(--br);background:var(--s);color:var(--tx2);font-size:12px;cursor:pointer;font-family:'Noto Kufi Arabic',sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.stab.on{background:var(--red);border-color:var(--red);color:#fff}
.stab:active{opacity:.8}
.litem{background:var(--s);border:1px solid var(--br);border-radius:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;padding:12px 14px;animation:fu .3s ease both}
.lcov{width:46px;height:62px;border-radius:8px;object-fit:cover;background:var(--s2);flex-shrink:0}
.linf{flex:1;min-width:0}
.ltit{font-size:14px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lmet{font-size:11px;color:var(--tx2)}
.lright{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ssel{background:var(--s2);border:1px solid var(--br);border-radius:8px;padding:6px 8px;color:var(--tx);font-family:'Noto Kufi Arabic',sans-serif;font-size:11px;outline:none;direction:rtl}
.cinp{width:56px;background:var(--s2);border:1px solid var(--br);border-radius:8px;padding:6px 8px;color:var(--tx);font-family:'Noto Kufi Arabic',sans-serif;font-size:11px;outline:none;text-align:center}
.dbtn{width:28px;height:28px;border-radius:8px;border:1px solid var(--br);background:transparent;color:var(--tx2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.dbtn:active{border-color:var(--red);color:var(--red)}
.sbadge{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700}
.s-r{background:rgba(76,201,240,.12);color:var(--blue)}
.s-c{background:rgba(168,224,99,.12);color:var(--gr)}
.s-p{background:rgba(255,209,102,.12);color:var(--gold)}
.s-d{background:rgba(230,57,70,.12);color:var(--red)}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:800;display:none;align-items:center;justify-content:center;padding:20px}
.mbg.open{display:flex}
.mbox{background:var(--s);border:1px solid var(--br);border-radius:24px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 60px 120px rgba(0,0,0,.7);animation:fu .25s ease;position:relative}
.mhdr{display:flex;gap:18px;padding:24px 24px 18px;border-bottom:1px solid var(--br)}
.mcov{width:90px;height:126px;border-radius:10px;object-fit:cover;background:var(--s2);flex-shrink:0}
.mmeta{flex:1}
.mtit{font-size:18px;font-weight:700;margin-bottom:8px;line-height:1.3}
.mtags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tag{padding:3px 8px;border-radius:6px;background:var(--s2);font-size:11px;color:var(--tx2)}
.mstats{display:flex;gap:12px;font-size:12px;color:var(--tx2);flex-wrap:wrap}
.mbdy{padding:18px 24px 24px}
.mdesc{font-size:13px;color:var(--tx2);line-height:1.8;margin-bottom:20px}
.madd h3{font-size:14px;font-weight:700;margin-bottom:12px}
.marow{display:flex;gap:8px;flex-wrap:wrap}
.msel{flex:1;background:var(--bg);border:1px solid var(--br);border-radius:10px;padding:11px 12px;color:var(--tx);font-family:'Noto Kufi Arabic',sans-serif;font-size:13px;outline:none;direction:rtl;min-width:130px}
.msel:focus{border-color:var(--red)}
.madbtn{padding:11px 18px;background:var(--red);border:none;border-radius:10px;color:#fff;font-family:'Noto Kufi Arabic',sans-serif;font-size:13px;font-weight:700;cursor:pointer;touch-action:manipulation;white-space:nowrap}
.madbtn.added{background:var(--gr);color:#000}
.madbtn:active{opacity:.8}
.mcls{position:absolute;top:12px;left:12px;width:30px;height:30px;border-radius:50%;border:1px solid var(--br);background:var(--s2);color:var(--tx2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.mcls:active{border-color:var(--red);color:var(--red)}

/* LOADER / EMPTY */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:16px;color:var(--tx2)}
.spin{width:38px;height:38px;border-radius:50%;border:3px solid var(--s2);border-top-color:var(--red);animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:70px 20px;color:var(--tx2)}
.eico{font-size:52px;margin-bottom:14px}
.etit{font-size:15px;color:var(--tx);margin-bottom:6px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--s2);border-radius:2px}
@media(max-width:500px){.sgrid{grid-template-columns:repeat(2,1fr)}.mhdr{flex-direction:column}.lright{flex-wrap:wrap}}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="alogo">MangaVault</div>
  <div class="asub">مكتبتك المانغا الشخصية</div>
  <div class="acard">
    <div class="atabs">
      <button class="atab on" id="tab-login">تسجيل الدخول</button>
      <button class="atab" id="tab-reg">حساب جديد</button>
    </div>
    <div id="f-login">
      <div class="af"><label>اسم المستخدم</label><input id="lu" type="text" placeholder="اسم المستخدم" autocomplete="username"/></div>
      <div class="af"><label>كلمة المرور</label><input id="lp" type="password" placeholder="••••••" autocomplete="current-password"/></div>
      <button class="abtn" id="btn-login">دخول 🎌</button>
    </div>
    <div id="f-reg" style="display:none">
      <div class="af"><label>اسم المستخدم</label><input id="ru" type="text" placeholder="اختر اسماً" autocomplete="username"/></div>
      <div class="af"><label>كلمة المرور</label><input id="rp" type="password" placeholder="6 أحرف على الأقل" autocomplete="new-password"/></div>
      <button class="abtn" id="btn-reg">إنشاء الحساب ✨</button>
    </div>
    <div class="aerr" id="aerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav>
    <div class="nlogo">MangaVault</div>
    <div class="nlinks">
      <button class="nbtn on" id="nb-search">🔍 اكتشف</button>
      <button class="nbtn" id="nb-list">📋 قائمتي</button>
      <button class="nbtn" id="nb-favs">❤️ مفضلة</button>
    </div>
    <div class="nright">
      <div class="nav-av" id="nav-av">A</div>
      <button class="nout" id="btn-logout">خروج</button>
    </div>
  </nav>

  <!-- SEARCH -->
  <div class="page on" id="pg-search">
    <div class="hero">
      <h1>اكتشف <span>مانغاك</span></h1>
      <p>بيانات حقيقية من MyAnimeList</p>
      <div class="sbox">
        <input id="q" type="text" placeholder="ابحث... Naruto, Berserk, One Piece"/>
        <button id="btn-search">بحث</button>
      </div>
    </div>
    <div class="gpills" id="gpills"></div>
    <div id="results"></div>
  </div>

  <!-- MYLIST -->
  <div class="page" id="pg-list">
    <div style="margin-bottom:24px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:2px">قائمة <span style="color:var(--red)">القراءة</span></div>
      <div style="color:var(--tx2);font-size:13px">تتبع تقدمك وسجّل فصولك</div>
    </div>
    <div class="sgrid" id="sgrid"></div>
    <div class="stabs">
      <button class="stab on" data-f="all">📚 الكل</button>
      <button class="stab" data-f="reading">📖 أقرأ</button>
      <button class="stab" data-f="completed">✅ أنهيت</button>
      <button class="stab" data-f="plan">🕐 لاحقاً</button>
      <button class="stab" data-f="dropped">❌ توقفت</button>
    </div>
    <div id="list-items"></div>
  </div>

  <!-- FAVS -->
  <div class="page" id="pg-favs">
    <div style="margin-bottom:24px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:2px">❤️ <span style="color:var(--red)">المفضلة</span></div>
    </div>
    <div class="mgrid" id="favs-grid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="mbg" id="mbg">
  <div class="mbox">
    <button class="mcls" id="btn-mcls">×</button>
    <div class="mhdr" id="mhdr"></div>
    <div class="mbdy" id="mbdy"></div>
  </div>
</div>

<script>
// ===== DB =====
var DB = {}, CU = null, SF = 'all';
try { DB = JSON.parse(localStorage.getItem('mv3') || '{}'); } catch(e){}
try { CU = localStorage.getItem('mv3_u'); } catch(e){}

function ud(){ return (CU && DB[CU]) ? DB[CU] : {list:[],favs:[]}; }
function sv(){
  try { localStorage.setItem('mv3', JSON.stringify(DB)); } catch(e){}
}

// ===== AUTH LOGIC =====
function showErr(m){ document.getElementById('aerr').textContent = m; }

function doLogin(){
  var u = document.getElementById('lu').value.trim();
  var p = document.getElementById('lp').value;
  if(!u||!p){ showErr('أدخل جميع الحقول'); return; }
  if(!DB[u]||DB[u].pass!==p){ showErr('بيانات غير صحيحة'); return; }
  CU = u;
  try{ localStorage.setItem('mv3_u', u); }catch(e){}
  startApp();
}

function doRegister(){
  var u = document.getElementById('ru').value.trim();
  var p = document.getElementById('rp').value;
  if(!u||!p){ showErr('أدخل جميع الحقول'); return; }
  if(DB[u]){ showErr('اسم المستخدم موجود مسبقاً'); return; }
  if(p.length < 4){ showErr('كلمة المرور قصيرة جداً'); return; }
  DB[u] = {pass:p, list:[], favs:[]};
  sv();
  CU = u;
  try{ localStorage.setItem('mv3_u', u); }catch(e){}
  startApp();
}

function doLogout(){
  CU = null;
  try{ localStorage.removeItem('mv3_u'); }catch(e){}
  document.getElementById('auth').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function switchTab(t){
  document.getElementById('tab-login').classList.toggle('on', t==='login');
  document.getElementById('tab-reg').classList.toggle('on', t==='reg');
  document.getElementById('f-login').style.display = t==='login' ? '' : 'none';
  document.getElementById('f-reg').style.display = t==='reg' ? '' : 'none';
  document.getElementById('aerr').textContent = '';
}

function startApp(){
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('nav-av').textContent = CU[0].toUpperCase();
  loadPopular();
}

// ===== NAV =====
function showPage(pg){
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('on'); });
  document.querySelectorAll('.nbtn').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById('pg-'+pg).classList.add('on');
  document.getElementById('nb-'+pg).classList.add('on');
  if(pg==='list') renderList();
  if(pg==='favs') renderFavs();
}

// ===== API — Jikan via allorigins proxy =====
var BASE = 'https://api.jikan.moe/v4';

function apiFetch(path, cb){
  var url = BASE + path;
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(d){ cb(null, d); })
    .catch(function(e){ cb(e, null); });
}

var GENRES = ['أكشن','مغامرة','كوميديا','دراما','فانتازيا','رعب','رومانسية','خيال علمي','رياضة','خارق للطبيعة'];
var GIDS   = [1,2,4,8,10,14,22,24,30,37];

function initGenres(){
  var el = document.getElementById('gpills');
  el.innerHTML = GENRES.map(function(g,i){
    return '<button class="gpill" data-i="'+i+'">'+g+'</button>';
  }).join('');
  el.querySelectorAll('.gpill').forEach(function(b){
    b.addEventListener('click', function(){
      searchByGenre(parseInt(this.getAttribute('data-i')));
    });
  });
}

function loadPopular(){
  initGenres();
  var el = document.getElementById('results');
  el.innerHTML = '<div class="loader"><div class="spin"></div><span>جاري التحميل...</span></div>';
  apiFetch('/top/manga?limit=24&type=manga', function(err, data){
    if(err||!data){ el.innerHTML = '<div class="empty"><div class="eico">⚠️</div><div class="etit">تعذر الاتصال</div><div>تحقق من الإنترنت</div></div>'; return; }
    renderGrid(data.data, 'أشهر المانغا', el);
  });
}

function doSearch(){
  var q = document.getElementById('q').value.trim();
  if(!q) return;
  var el = document.getElementById('results');
  el.innerHTML = '<div class="loader"><div class="spin"></div><span>جاري البحث...</span></div>';
  apiFetch('/manga?q='+encodeURIComponent(q)+'&limit=24&sfw=true', function(err, data){
    if(err||!data||!data.data.length){ el.innerHTML = '<div class="empty"><div class="eico">🔍</div><div class="etit">لا توجد نتائج</div></div>'; return; }
    renderGrid(data.data, 'نتائج: "'+q+'"', el);
  });
}

function searchByGenre(i){
  var el = document.getElementById('results');
  el.innerHTML = '<div class="loader"><div class="spin"></div><span>جاري التحميل...</span></div>';
  apiFetch('/manga?genres='+GIDS[i]+'&limit=24&order_by=score&sort=desc', function(err, data){
    if(err||!data){ return; }
    renderGrid(data.data, GENRES[i], el);
  });
}
